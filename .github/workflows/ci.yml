name: CI/CD Pipeline

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '24'
      
      - name: install server dependencies
        run: npm install
        working-directory: server

      - name: run tests
        run: npm test
        working-directory: server
